<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraForge | Premium Live Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* 1. THE FOUNDATION (Dark Mode) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #05050A;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #05050A 70%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* 2. THE TYPOGRAPHY & NEON ACCENTS */
        h1, h2, h3 { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; }
        .neon-text {
            background: linear-gradient(90deg, #00e5ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
        }

        /* 3. GLASSMORPHISM (The Premium ESPN Look) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .glass-panel:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 229, 255, 0.4);
        }

        /* 4. LIVE MATCH SCOREBOARD GRID */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .team { text-align: center; flex: 1; }
        .team-name { font-size: 1.5rem; color: #a0aec0; letter-spacing: 2px; }
        .score { font-size: 3.5rem; font-family: 'Rajdhani', sans-serif; font-weight: 700; color: #fff; }
        .vs { font-size: 2rem; color: #ff3366; font-family: 'Rajdhani', sans-serif; font-weight: 700; }

        /* 5. CSS ANIMATIONS (Pulsing Live Dot) */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            color: #ff3366;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .dot {
            height: 12px; width: 12px;
            background-color: #ff3366;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 51, 102, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); }
        }

        /* 6. DYNAMIC STAT BARS */
        .stat-row { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.9rem; color: #a0aec0; }
        .progress-bar-bg { background: rgba(255, 255, 255, 0.1); height: 8px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, #ff3366, #ffaa00); height: 100%; width: 75%; }
        .progress-bar-fill.blue { background: linear-gradient(90deg, #00e5ff, #0055ff); width: 62%; }
    </style>
</head>
<body>

    <h1 class="neon-text">ASTRAFORGE BROADCAST</h1>

    <div class="glass-panel">
        <div class="live-indicator"><div class="dot"></div> LIVE T20 FINAL</div>
        
        <div class="scoreboard">
            <div class="team">
                <div class="team-name">RCB</div>
                <div class="score">198/4</div>
                <div style="color: #00e5ff;">Overs: 18.4</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <div class="team-name">GT</div>
                <div class="score" id="dynamic-score">Target: 215</div>
                <div style="color: #a0aec0;">Yet to bat</div>
            </div>
        </div>

        <div class="stat-row" style="margin-top: 25px;">
            <span>Current Run Rate: <strong style="color: #fff;" id="crr">10.60</strong></span>
            <span>Projected Score: <strong style="color: #fff;" id="proj">212</strong></span>
        </div>
    </div>

    <div class="glass-panel">
        <h3>⚡ AI Win Probability</h3>
        
        <div class="stat-row"><span>RCB (Royal Challengers Bengaluru)</span><span>75%</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>

        <div class="stat-row"><span>GT (Gujarat Titans)</span><span>25%</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill blue" style="width: 25%;"></div></div>
    </div>

    <script>
        // This JavaScript simulates a live data feed updating the screen in real-time
        setInterval(() => {
            // Randomly fluctuate the Current Run Rate slightly to simulate live changes
            let currentRunRate = parseFloat(document.getElementById('crr').innerText);
            let fluctuation = (Math.random() * 0.2 - 0.1); 
            document.getElementById('crr').innerText = (currentRunRate + fluctuation).toFixed(2);
            
            // Randomly fluctuate the projected score
            let projectedScore = parseInt(document.getElementById('proj').innerText);
            let projFluctuation = Math.floor(Math.random() * 3) - 1;
            document.getElementById('proj').innerText = projectedScore + projFluctuation;
        }, 3000); // Updates every 3 seconds
    </script>

</body>
</html>
